<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment Gateway</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b111e; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .box { background-color: #111827; border: 1px solid #1f2937; max-width: 350px; width: 100%; border-radius: 20px; padding: 25px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        .header-info { display: flex; justify-content: space-between; font-size: 10px; color: #6b7280; margin-bottom: 15px; }
        .logo { font-size: 20px; font-weight: bold; color: #ec4899; margin-bottom: 20px; }
        
        .ticker { background: #064e3b; color: #34d399; font-size: 11px; padding: 8px; border-radius: 8px; margin-bottom: 15px; }
        .trust-slide { background: linear-gradient(135deg, #38bdf8, #10b981); padding: 15px; border-radius: 12px; margin-bottom: 20px; color: #fff; }
        .amount-display { font-size: 36px; font-weight: bold; margin: 10px 0; color: #fff; }
        
        .upi-id-box { background: #1e293b; padding: 10px; border-radius: 8px; font-size: 14px; margin: 15px 0; border: 1px dashed #475569; }
        .wa-help { display: block; margin: 10px 0; color: #38bdf8; font-size: 12px; text-decoration: none; }
        
        .pay-btn { background: #10b981; color: white; padding: 15px; border: none; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .highlight-box { background: rgba(56, 189, 248, 0.1); border-left: 4px solid #38bdf8; padding: 10px; margin: 15px 0; text-align: left; font-size: 12px; }
        input { width: 100%; padding: 12px; margin-top: 10px; background: #0b111e; border: 1px solid #374151; border-radius: 8px; color: #fff; text-align: center; }
        .verify-btn { background: transparent; color: #38bdf8; border: none; margin-top: 10px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="header-info"><span>Server: IN/USA</span><span>Status: Online</span></div>
        <div class="logo">RUSSIAN MARKET</div>
        
        <div class="ticker" id="purchaseTicker">Loading live updates...</div>

        <div class="trust-slide">
            <h3>⚡ #1 Fastest Card Provider</h3>
            <p>Trusted by 10,000+ customers.</p>
        </div>

        <div class="amount-display" id="finalPrice">₹0</div>
        
        <div class="upi-id-box">UPI: <b>aaditya120@ptyes</b></div>
        
        <a href="https://wa.me/919243074322" class="wa-help">💬 Need help? Contact us on WhatsApp</a>
        <button class="pay-btn" onclick="payNow()">PAY NOW via UPI</button>

        <div class="highlight-box">
            <b>English:</b> Card will be sent to your email instantly.<br>
            <b>Hindi:</b> पेमेंट होते ही कार्ड आपके मेल पर आ जाएगा।
        </div>

        <input type="text" id="utr" placeholder="Enter 12 Digit UTR Number">
        <button onclick="verifyPayment()" class="verify-btn">Verify UTR</button>
    </div>

    <script>
        // Random Purchase Animation
        const names = ["ara*n", "v*ram", "r*hul", "a*it", "pr*ya", "s*eha"];
        const cards = ["Gold Card", "Platinum Card", "Silver Card", "VIP Pack"];
        setInterval(() => {
            const name = names[Math.floor(Math.random() * names.length)];
            const card = cards[Math.floor(Math.random() * cards.length)];
            document.getElementById('purchaseTicker').innerText = `🔥 ${name} purchase ${card}`;
        }, 3500);

        // Price display
        const params = new URLSearchParams(window.location.search);
        const price = params.get('price') || '0';
        document.getElementById('finalPrice').innerText = '₹' + price;

        function payNow() {
            window.location.href = `upi://pay?pa=aaditya120@ptyes&pn=RussianMarket&am=${price}&cu=INR&tn=Payment`;
        }

        function verifyPayment() {
            const utr = document.getElementById('utr').value;
            if(utr.length >= 12) {
                alert("Verification in progress...");
            } else {
                alert("Please enter a valid 12 digit UTR number.");
            }
        }
    </script>
</body>
</html>
